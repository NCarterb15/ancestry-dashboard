<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Family Research Dashboard</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f4f2ed; color: #2d2a26;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1d1b18; color: #e8e4dd; }
    input { background: #2a2723; color: #e8e4dd; border-color: #4a453e !important; }
  }
  .card {
    width: 100%; max-width: 22rem; margin: 1rem; padding: 2rem 1.5rem;
    text-align: center;
  }
  h1 { font-size: 1.15rem; font-weight: 600; margin: 0 0 0.4rem; }
  p.hint { font-size: 0.85rem; opacity: 0.7; margin: 0 0 1.4rem; }
  input[type=password] {
    width: 100%; padding: 0.65rem 0.8rem; font-size: 1rem;
    border: 1px solid #c8c2b8; border-radius: 8px; outline: none;
  }
  input[type=password]:focus { border-color: #8a7d68; }
  button {
    width: 100%; margin-top: 0.75rem; padding: 0.65rem; font-size: 1rem;
    border: none; border-radius: 8px; cursor: pointer;
    background: #4a5d4a; color: #fff;
  }
  button:disabled { opacity: 0.6; cursor: wait; }
  .error { color: #a33b2e; font-size: 0.85rem; min-height: 1.2em; margin-top: 0.75rem; }
  .status { font-size: 0.85rem; opacity: 0.7; margin-top: 0.75rem; min-height: 1.2em; }
</style>
</head>
<body>
<div class="card">
  <h1>Family Research Dashboard</h1>
  <p class="hint">Enter the family passphrase to open the dashboard.</p>
  <form id="form">
    <input type="password" id="pass" autocomplete="current-password"
           placeholder="Passphrase" autofocus aria-label="Passphrase">
    <button type="submit" id="go">Unlock</button>
  </form>
  <div class="error" id="err" role="alert"></div>
  <div class="status" id="status"></div>
</div>

// ---- crypto parameters: PBKDF2-SHA256 (CONFIG.iterations) -> AES-256-GCM ---
// Must match the Node-side encryptor exactly. The GCM auth tag is the last
// 16 bytes of CONFIG.data; Web Crypto consumes it as part of the ciphertext.
var KEY_CACHE = "dashboard_key_v1"; // localStorage slot for the DERIVED key
                                    // (raw AES key bytes, base64). The
                                    // passphrase itself is NEVER stored.

function b64ToBytes(b64) {
  var bin = atob(b64), out = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
function bytesToB64(buf) {
  var bytes = new Uint8Array(buf), bin = "";
  for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// Derive an AES-GCM key from the passphrase. "extractable" so we can cache
// the derived key bytes locally and skip retyping on the next visit.
function deriveKey(passphrase) {
  var enc = new TextEncoder();
  return crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"])
    .then(function (base) {
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(CONFIG.salt), iterations: CONFIG.iterations, hash: "SHA-256" },
        base,
        { name: "AES-GCM", length: 256 },
        true, // extractable: allows exportKey for the localStorage cache
        ["decrypt"]
      );
    });
}

function importCachedKey(b64) {
  return crypto.subtle.importKey("raw", b64ToBytes(b64), { name: "AES-GCM" }, false, ["decrypt"]);
}

// Decrypt and, on success, replace this whole page with the dashboard.
function decryptAndShow(key) {
  return crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64ToBytes(CONFIG.iv) },
    key,
    b64ToBytes(CONFIG.data)
  ).then(function (plainBuf) {
    var html = new TextDecoder().decode(plainBuf);
    // A small floating "lock" link so the cached key can be cleared
    // (e.g. on a shared computer). Clearing it brings back this unlock page.
    var lock = '<div style="position:fixed;bottom:8px;right:10px;z-index:9999;' +
      'font:12px -apple-system,Segoe UI,Roboto,sans-serif;opacity:0.55">' +
      '<a href="#" style="color:inherit" onclick="try{localStorage.removeItem(' +
      "'" + KEY_CACHE + "'" + ')}catch(e){};location.reload();return false">' +
      '\uD83D\uDD12 lock</a></div>';
    document.open();
    document.write(html + lock);
    document.close();
  });
}

function setBusy(busy, msg) {
  document.getElementById("go").disabled = busy;
  document.getElementById("status").textContent = msg || "";
}

// Auto-unlock: if a derived key is cached from a previous visit, try it.
// A stale key (e.g. the passphrase was rotated) fails GCM authentication;
// we clear it and fall back to the form.
(function tryAutoUnlock() {
  var cached = null;
  try { cached = localStorage.getItem(KEY_CACHE); } catch (e) {}
  if (!cached || !window.crypto || !crypto.subtle) return;
  setBusy(true, "Unlocking\u2026");
  importCachedKey(cached)
    .then(decryptAndShow)
    .catch(function () {
      try { localStorage.removeItem(KEY_CACHE); } catch (e) {}
      setBusy(false, "");
    });
})();

document.getElementById("form").addEventListener("submit", function (ev) {
  ev.preventDefault();
  var err = document.getElementById("err");
  err.textContent = "";
  if (!window.crypto || !crypto.subtle) {
    err.textContent = "This browser does not support the encryption needed. Try a current browser over https.";
    return;
  }
  var pass = document.getElementById("pass").value;
  if (!pass) return;
  setBusy(true, "Checking\u2026");
  var derived;
  deriveKey(pass)
    .then(function (key) {
      derived = key;
      // Cache the DERIVED key (not the passphrase) before the page is replaced.
      return crypto.subtle.exportKey("raw", key).then(function (raw) {
        try { localStorage.setItem(KEY_CACHE, bytesToB64(raw)); } catch (e) {}
        return derived;
      });
    })
    .then(decryptAndShow)
    .catch(function () {
      // GCM authentication failed -> wrong passphrase (or corrupted payload).
      try { localStorage.removeItem(KEY_CACHE); } catch (e) {}
      setBusy(false, "");
      err.textContent = "That passphrase didn\u2019t work \u2014 please try again.";
      document.getElementById("pass").select();
    });
});
</script>
</body>
</html>
